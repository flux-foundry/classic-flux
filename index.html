<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flux-foundry / arcade</title>
    <style>
        /* PRO CODER OBSIDIAN THEME (NO BLUE) */
        :root {
            --bg-black: #010409;
            --bg-dark: #0d1117;
            --border: #30363d;
            --text-white: #f0f6fc;
            --text-dim: #8b949e;
            --emerald: #39d353; /* GitHub Green */
            --accent-dim: #238636;
            --mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: var(--mono);
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* BREADCRUMB - GRAYSCALE */
        .breadcrumb {
            font-size: 13px;
            margin-bottom: 30px;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }
        .breadcrumb span { color: var(--text-white); font-weight: bold; }

        /* CATEGORY LABELS */
        .category-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent-dim);
            text-transform: uppercase;
            margin: 40px 0 12px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .category-label::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: var(--border);
        }

        /* GAME BOX */
        .terminal-box {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 4px; /* Sharper corners for pro look */
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .game-row {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text-white);
            transition: 0.15s ease-in-out;
            position: relative;
        }

        .game-row:last-child { border-bottom: none; }

        /* HOVER STATE - GREEN ACCENT */
        .game-row:hover {
            background: rgba(57, 211, 83, 0.03);
            border-left: 4px solid var(--emerald);
            padding-left: 20px;
        }

        .name-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .game-name {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.2px;
        }

        /* GENRE TAGS - RETRO GREEN */
        .genre-tag {
            font-size: 10px;
            padding: 3px 10px;
            border: 1px solid var(--accent-dim);
            color: var(--emerald);
            background: rgba(35, 134, 54, 0.1);
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 2px;
        }

        .status-code {
            font-size: 12px;
            color: var(--text-dim);
            font-family: var(--mono);
        }

        .game-row:hover .game-name { color: var(--emerald); }
        .game-row:hover .status-code { color: var(--text-white); }

    </style>
</head>
<body>

    <div class="container">
        <div class="breadcrumb">
            ~/projects/<span>classic-flux</span>/bin/
        </div>

        <!-- MULTIPLAYER -->
        <div class="category-label">sys.multiplayer_2p</div>
        <div class="terminal-box">
            <a href="./multiplayer_2P/cyber_pong/" class="game-row">
                <div class="name-group">
                    <span class="game-name">cyber_pong</span>
                    <span class="genre-tag">Competitive</span>
                </div>
                <div class="status-code">0x001_READY</div>
            </a>
            <a href="./multiplayer_2P/pixel_reaction/" class="game-row">
                <div class="name-group">
                    <span class="game-name">pixel_reaction</span>
                    <span class="genre-tag">Reflex</span>
                </div>
                <div class="status-code">0x002_ACTIVE</div>
            </a>
            <a href="./multiplayer_2P/tap_drift_duel/" class="game-row">
                <div class="name-group">
                    <span class="game-name">tap_drift_duel</span>
                    <span class="genre-tag">Racing</span>
                </div>
                <div class="status-code">0x003_STABLE</div>
            </a>
        </div>

        <!-- SINGLEPLAYER -->
        <div class="category-label">sys.singleplayer</div>
        <div class="terminal-box">
            <a href="./singleplayer/crystal_tetris/" class="game-row">
                <div class="name-group">
                    <span class="game-name">crystal_tetris</span>
                    <span class="genre-tag">Puzzle</span>
                </div>
                <div class="status-code">0x004_LOADED</div>
            </a>
            <a href="./singleplayer/pøng/" class="game-row">
                <div class="name-group">
                    <span class="game-name">Pøng</span>
                    <span class="genre-tag">Arcade</span>
                </div>
                <div class="status-code">0x005_LEGACY</div>
            </a>
            <a href="./singleplayer/pop_wrap/" class="game-row">
                <div class="name-group">
                    <span class="game-name">pop_wrap</span>
                    <span class="genre-tag">Logic</span>
                </div>
                <div class="status-code">0x006_READY</div>
            </a>
        </div>
    </div>

</body>
</html>
