<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX-FOUNDRY / Terminal</title>
    <style>
        :root {
            --gh-bg: #0d1117;
            --gh-border: #30363d;
            --gh-text: #c9d1d9;
            --gh-success: #238636;
            --gh-link: #58a6ff;
            --font-mono: 'ui-monospace', 'SFMono-Regular', 'SF Mono', Menlo, Consolas, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--gh-bg);
            color: var(--gh-text);
            font-family: var(--font-mono);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .terminal {
            width: 100%;
            max-width: 800px;
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .terminal-header {
            background: #161b22;
            padding: 12px 20px;
            border-bottom: 1px solid var(--gh-border);
            display: flex;
            gap: 8px;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .content { padding: 30px; }

        .user-path { color: var(--gh-success); font-weight: bold; margin-bottom: 20px; }
        .user-path span { color: var(--gh-link); }

        .repo-stats {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
        }

        .section-header {
            color: #8b949e;
            font-size: 12px;
            margin-top: 30px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-header::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: var(--gh-border);
        }

        .game-grid { display: grid; gap: 8px; }

        .game-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            text-decoration: none;
            color: var(--gh-text);
            border: 1px solid transparent;
            border-radius: 4px;
            font-size: 14px;
            transition: 0.2s;
        }

        .game-item:hover {
            background: #161b22;
            border-color: #8b949e;
            color: var(--gh-link);
        }

        .game-item::before {
            content: "📄";
            margin-right: 12px;
            font-size: 12px;
            opacity: 0.6;
        }

        .status { margin-left: auto; font-size: 11px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="terminal-header">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
    </div>
    <div class="content">
        <div class="user-path">flux-foundry@arcadia:~/<span>classic-flux</span>$ ls --all</div>
        
        <div class="repo-stats">
            <span>⭐ 14 Stars</span>
            <span>🍴 2 Forks</span>
            <span>🟢 Public</span>
        </div>

        <div class="section-header">DIRECTORY: /multiplayer_2P</div>
        <div class="game-grid">
            <a href="./multiplayer_2P/cyber_pong/" class="game-item">
                cyber_pong
                <span class="status">v1.2.0</span>
            </a>
            <a href="./multiplayer_2P/pixel_reaction/" class="game-item">
                pixel_reaction
                <span class="status">BETA</span>
            </a>
            <a href="./multiplayer_2P/tap_drift_duel/" class="game-item">
                tap_drift_duel
                <span class="status">READY</span>
            </a>
        </div>

        <div class="section-header">DIRECTORY: /singleplayer</div>
        <div class="game-grid">
            <a href="./singleplayer/crystal_tetris/" class="game-item">
                crystal_tetris
                <span class="status">STABLE</span>
            </a>
            <a href="./singleplayer/Pøg/" class="game-item">
                Pøg
                <span class="status">LEGACY</span>
            </a>
            <a href="./singleplayer/pop_wrap/" class="game-item">
                pop_wrap
                <span class="status">READY</span>
            </a>
        </div>
    </div>
</div>

</body>
</html>
