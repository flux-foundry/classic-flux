<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Foundry | Game Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* Glass Container */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }

        h1 { margin-bottom: 20px; font-weight: 300; letter-spacing: 2px; }
        h2 { font-size: 1.2rem; margin-top: 20px; margin-bottom: 10px; color: #00d2ff; text-transform: uppercase; }

        .game-list { list-style: none; }

        .game-card {
            background: rgba(255, 255, 255, 0.1);
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            transition: 0.3s;
            display: block;
            text-decoration: none;
            color: white;
            border: 1px solid transparent;
        }

        .game-card:hover {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(0, 210, 255, 0.5);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>Flux Foundry</h1>
        
        <h2>Singleplayer</h2>
        <div class="game-list">
            <a href="./singleplayer/pop-wrap/" class="game-card">Pop Wrap</a>
            <a href="./singleplayer/crystal-tetris/" class="game-card">Crystal Tetris</a>
            <a href="./singleplayer/pong/" class="game-card">Classic Pong</a>
        </div>

        <h2>Multiplayer</h2>
        <div class="game-list">
            <p style="color: rgba(255,255,255,0.5); font-size: 0.8rem;">Coming Soon...</p>
            <!-- Add future games like this: -->
            <!-- <a href="./multiplayer/game-name/" class="game-card">Game Name</a> -->
        </div>
    </div>

</body>
</html>
