<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Foundry | Game Suite</title>
    <style>
        :root {
            --bg: #0a0a0b;
            --card-bg: #141415;
            --border: #262626;
            --text-main: #f4f4f5;
            --text-dim: #a1a1aa;
            --accent: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 80px 20px;
        }

        .wrapper {
            width: 100%;
            max-width: 900px;
        }

        header {
            margin-bottom: 60px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-dim);
            font-size: 14px;
            margin-top: 8px;
        }

        .category-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 24px;
            display: block;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 48px;
        }

        .game-link {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .game-link:hover {
            border-color: #404040;
            background: #1a1a1b;
            transform: translateY(-2px);
        }

        .game-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .game-desc {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .arrow {
            margin-top: 16px;
            font-size: 18px;
            opacity: 0.3;
            transition: 0.2s;
        }

        .game-link:hover .arrow {
            opacity: 1;
            transform: translateX(4px);
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>Flux Foundry</h1>
        <p>A collection of high-performance web simulations.</p>
    </header>

    <span class="category-label">Single Player</span>
    <div class="grid">
        <a href="./singleplayer/pop-wrap/" class="game-link">
            <div>
                <div class="game-title">Pop Wrap</div>
                <div class="game-desc">Strategic wrap-based puzzle mechanics.</div>
            </div>
            <div class="arrow">→</div>
        </a>

        <a href="./singleplayer/crystal-tetris/" class="game-link">
            <div>
                <div class="game-title">Crystal Tetris</div>
                <div class="game-desc">Refined tile-matching simulation.</div>
            </div>
            <div class="arrow">→</div>
        </a>

        <a href="./singleplayer/pong/" class="game-link">
            <div>
                <div class="game-title">Classic Pong</div>
                <div class="game-desc">Minimalist physics-based interaction.</div>
            </div>
            <div class="arrow">→</div>
        </a>
    </div>

    <span class="category-label">Multiplayer Systems</span>
    <div class="grid">
        <a href="./multiplayer_2P/cyberpong/cyberpong.html" class="game-link">
            <div>
                <div class="game-title">Cyber Pong</div>
                <div class="game-desc">Two-player competitive interface.</div>
            </div>
            <div class="arrow">→</div>
        </a>
    </div>
</div>

</body>
</html>
