<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumberjack's Slow Life</title>
    <style>
        * { user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #050505; overflow: hidden; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        #outer-wrap { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #game-container { position: relative; width: 100%; max-height: 100vh; aspect-ratio: 16/9; max-width: calc(100vh * 16/9); background: #000; box-shadow: 0 0 30px rgba(0,0,0,0.9); transition: transform 0.3s ease; transform-origin: center; }
        #game-container.is-rotated { transform: rotate(90deg); width: 100vh !important; height: 100vw !important; max-width: none; max-height: none; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; image-rendering: crisp-edges; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; touch-action: none; }
        .btn { position: absolute; background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; width: 50px; height: 50px; pointer-events: auto; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; transition: background 0.1s; touch-action: none; }
        .btn:active { background: rgba(255, 255, 255, 0.35); }
        .btn svg { width: 24px; height: 24px; stroke: white; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        @media (min-width: 801px) { .btn { display: none; } }
        #btn-up { bottom: 130px; left: 80px; } #btn-down { bottom: 30px; left: 80px; } 
        #btn-left { bottom: 80px; left: 30px; } #btn-right { bottom: 80px; left: 130px; }
        #btn-run { bottom: 30px; right: 120px; width: 60px; height: 60px; background: rgba(100, 200, 255, 0.15); border-color: rgba(100, 200, 255, 0.4); }
        #btn-interact { bottom: 80px; right: 30px; width: 70px; height: 70px; background: rgba(255, 100, 100, 0.15); border-color: rgba(255, 100, 100, 0.4); border-width: 3px; }
        
        #start-screen, #exit-modal { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; text-align: center; z-index: 10; }
        #exit-modal { z-index: 30; background: rgba(0,0,0,0.85); display: none; pointer-events: auto; }
        #menuBg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: -1; }
        
        #start-title { font-family: 'Georgia', serif; font-weight: 900; color: #FFF; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 4px 6px rgba(0,0,0,0.8), 0px 0px 15px rgba(40,200,80,0.5); margin-bottom: 20px; z-index: 1; margin-top: 5vh; line-height: 1.1; }
        .title-small { font-size: 2.5vw; color: #A8D5BA; font-weight: 600; letter-spacing: 5px; }
        .title-big { font-size: 7vw; color: #E8F5E9; letter-spacing: 1px; }
        .title-sub { font-size: 4vw; color: #78C850; font-family: 'Courier New', monospace; letter-spacing: 8px; text-shadow: 2px 2px 0 #188038; }
        @media (max-width: 800px) { .title-small { font-size: 14px; } .title-big { font-size: 35px; } .title-sub { font-size: 18px; } #start-title { margin-top: 2vh; margin-bottom: 15px; } }
        
        #settings-btn { position: absolute; top: 10px; right: 10px; width: 40px; height: 40px; background: rgba(0,0,0,0.6); border: 2px solid white; border-radius: 5px; cursor: pointer; z-index: 5; display:flex; justify-content:center; align-items:center; }
        
        .modal-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; border: 4px solid #D8A058; padding: 20px; color: white; text-align: center; z-index: 20; display: none; width: 320px; max-height: 90%; overflow-y: auto; font-family: inherit; box-shadow: 0 10px 40px rgba(0,0,0,0.9); pointer-events: auto; }
        .setting-section { margin-bottom: 15px; border-bottom: 1px solid #555; padding-bottom: 10px; }
        .setting-section h3 { margin: 0 0 10px 0; color: #F8D088; }
        .setting-row { margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .setting-row label { width: 80px; text-align: left; font-size: 14px; }
        .setting-row input { flex-grow: 1; margin-left: 10px; cursor: pointer; }
        .menu-btn { background: #2A6B32; color: white; border: 2px solid #E8F5E9; padding: 10px 15px; cursor: pointer; margin-top: 5px; font-family: inherit; width: 100%; font-size: 16px; font-weight: bold; border-radius: 5px; transition: transform 0.1s, background 0.2s; display:flex; justify-content: center; align-items: center; text-transform: uppercase; letter-spacing: 1px; pointer-events: auto; }
        .menu-btn:hover { background: #388E3C; }
        .menu-btn:active { transform: scale(0.95); }
        .menu-btn.disabled { background: #444 !important; color: #888 !important; border-color: #666 !important; cursor: not-allowed; }
        .menu-btn.disabled:active { transform: none; }
        .small-btn { padding: 6px 12px; width: auto; margin: 0 10px; }
        #main-menu-btns { display: flex; flex-direction: column; align-items: center; width: 280px; gap: 6px; z-index: 1; pointer-events: auto; }
        
        .save-slot { background: #333; border: 2px solid #777; padding: 10px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; text-align: left; font-size: 12px; border-radius: 5px; cursor: pointer; transition: background 0.2s; }
        .save-slot:hover { border-color: #F8D088; background: #444; }
        .slot-title { font-weight: bold; font-size: 14px; color: #F8D088; margin-bottom: 4px;}
        .delete-btn { background: none; border: none; cursor: pointer; padding: 5px; color: #FF5555; transition: transform 0.2s; display: flex; align-items: center; justify-content: center; }
        .delete-btn:hover { transform: scale(1.2); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .back-btn { background: none; border: none; cursor: pointer; color: white; padding: 5px; display: flex; align-items: center; }
        .back-btn:hover { color: #F8D088; }
        #pc-controls-info { font-size: 12px; color: #A8D5BA; margin-top: 10px; display: none; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="outer-wrap">
    <div id="game-container">
        <canvas id="gameCanvas" width="480" height="270"></canvas>
        <button id="settings-btn" onclick="openOptions(false)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
        
        <div id="options-menu" class="modal-menu">
            <div class="top-bar">
                <button class="back-btn" onclick="closeOptions()" onmouseenter="playSound('blip')" title="Back">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"></path><path d="M12 19l-7-7 7-7"></path></svg>
                </button>
                <h2 id="options-title" style="margin:0; flex-grow:1; text-align:center; padding-right:28px;">Settings</h2>
            </div>
            
            <div class="setting-section" id="save-section" style="display:none;">
                <button class="menu-btn" style="background:#4CAF50; border-color:#81C784;" onmouseenter="playSound('blip')" onclick="showSaveSlots()">Save Game</button>
            </div>

            <div class="setting-section">
                <h3>Display</h3>
                <div style="display:flex; justify-content:center; align-items:center;">
                    <button class="menu-btn small-btn" onmouseenter="playSound('blip')" onclick="toggleFullscreen()" title="Toggle Fullscreen">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                    </button>
                    <button class="menu-btn small-btn" onmouseenter="playSound('blip')" onclick="toggleOrientation()" title="Rotate Screen">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                </div>
            </div>

            <div class="setting-section">
                <h3>Audio</h3>
                <div class="setting-row"><label>Music</label><input type="range" id="v-mus" min="0" max="1" step="0.1" value="1" onchange="volMus=this.value"></div>
                <div class="setting-row"><label>SFX</label><input type="range" id="v-sfx" min="0" max="1" step="0.1" value="1" onchange="volSfx=this.value"></div>
            </div>

            <div class="setting-section">
                <h3>Controls</h3>
                <div style="display:flex; justify-content:center;">
                    <button class="menu-btn small-btn" style="font-size:14px;" onmouseenter="playSound('blip')" onclick="setControls('desktop')">PC</button>
                    <button class="menu-btn small-btn" style="font-size:14px;" onmouseenter="playSound('blip')" onclick="setControls('mobile')">Mobile</button>
                </div>
                <div id="pc-controls-info"><b>WASD</b> - Move<br><b>Shift</b> - Sprint<br><b>E / Space</b> - Interact</div>
            </div>

            <div style="display:flex; gap: 10px; margin-top: 15px;">
                <button id="quit-btn" class="menu-btn" style="background:#555; border-color:#888;" onmouseenter="playSound('blip')" onclick="quitToMenu()">Menu</button>
                <button class="menu-btn" style="background:#A03030; border-color:#FF6060;" onmouseenter="playSound('blip')" onclick="showExitPrompt()">Exit</button>
            </div>
        </div>

        <div id="slot-menu" class="modal-menu">
            <div class="top-bar">
                <button class="back-btn" onclick="closeSlotMenu()" onmouseenter="playSound('blip')" title="Back">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"></path><path d="M12 19l-7-7 7-7"></path></svg>
                </button>
                <h2 id="slot-title" style="margin:0; flex-grow:1; text-align:center; padding-right:28px;">Select Slot</h2>
            </div>
            <div id="slot-list"></div>
        </div>

        <div id="ui-layer">
            <div class="btn" id="btn-up"><svg><path d="M12 19V5M5 12l7-7 7 7"/></svg></div>
            <div class="btn" id="btn-down"><svg><path d="M12 5v14M5 12l7 7 7-7"/></svg></div>
            <div class="btn" id="btn-left"><svg><path d="M19 12H5M12 5l-7 7 7 7"/></svg></div>
            <div class="btn" id="btn-right"><svg><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
            <div class="btn" id="btn-run"><svg viewBox="0 0 24 24"><path d="M22 13V9a2 2 0 0 0-2-2h-3.4a2 2 0 0 0-1.4.6L10 12.8A1 1 0 0 1 9.3 13H5a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h14a2 2 0 0 0 2-2v-4z"/><path d="M22 13H15"/></svg></div>
            <div class="btn" id="btn-interact"><svg viewBox="0 0 24 24"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.8-2l-4.2-3.8a2 2 0 0 1 2.8-2.8l2.4 2.1V11a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2v0"/></svg></div>
        </div>
        
        <div id="start-screen">
            <canvas id="menuBg"></canvas>
            <div id="start-title">
                <div class="title-small">THE</div>
                <div class="title-big">LUMBERJACK'S</div>
                <div class="title-sub">SLOW LIFE</div>
            </div>
            <div id="main-menu-btns">
                <button class="menu-btn disabled" id="btn-continue" onmouseenter="playSound('blip')" onclick="loadLatestGame()">Continue</button>
                <button class="menu-btn" onmouseenter="playSound('blip')" onclick="startGame(false)">New Game</button>
                <button class="menu-btn" onmouseenter="playSound('blip')" onclick="showLoadSlots()">Load Game</button>
                <button class="menu-btn" onmouseenter="playSound('blip')" onclick="openOptions(true)">Options</button>
                <button class="menu-btn" onmouseenter="playSound('blip')" onclick="showExitPrompt()" style="background:#802020; border-color:#A03030;">Exit</button>
            </div>
        </div>

        <div id="exit-modal">
            <div class="modal-menu" style="display:block;">
                <h3 style="color:white; margin-bottom: 20px;">Do you want to exit?</h3>
                <div style="display:flex; gap: 10px;">
                    <button class="menu-btn" style="background:#A03030; border-color:#FF6060;" onmouseenter="playSound('blip')" onclick="window.close()">Yes</button>
                    <button class="menu-btn" style="background:#555; border-color:#888;" onmouseenter="playSound('blip')" onclick="document.getElementById('exit-modal').style.display='none'">No</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function applyAutoOrientation() {
    const container = document.getElementById('game-container');
    if (window.innerHeight > window.innerWidth) {
        container.classList.add('is-rotated');
    } else {
        container.classList.remove('is-rotated');
    }
}
applyAutoOrientation();
window.addEventListener('resize', applyAutoOrientation);

let isMainMenu = true;
let menuTime = 0;
let slotMenuOrigin = 'main';

function drawMenuBackground() {
    if(!isMainMenu) return;
    const mc = document.getElementById('menuBg');
    mc.width = 800; mc.height = 450;
    const mctx = mc.getContext('2d');
    
    menuTime += 0.005;

    let grad = mctx.createLinearGradient(0,0,0,mc.height);
    grad.addColorStop(0, '#0F2A15'); grad.addColorStop(0.5, '#1E4525'); grad.addColorStop(1, '#3B6B35');
    mctx.fillStyle = grad; mctx.fillRect(0,0,mc.width,mc.height);

    mctx.save();
    mctx.globalCompositeOperation = 'screen';
    for(let i=0; i<6; i++) {
        let alpha = 0.04 + Math.sin(menuTime*2 + i)*0.02;
        mctx.fillStyle = `rgba(255, 230, 150, ${Math.max(0, alpha)})`;
        mctx.beginPath(); mctx.moveTo(mc.width/2, -150);
        mctx.lineTo(mc.width * 0.2 * i + Math.sin(menuTime)*50, mc.height);
        mctx.lineTo(mc.width * 0.2 * (i+1) + Math.cos(menuTime)*50, mc.height); mctx.fill();
    }
    mctx.restore();

    for(let layer=0; layer<3; layer++) {
        mctx.fillStyle = layer === 0 ? '#0B1A0F' : (layer === 1 ? '#122E17' : '#1A4221');
        let speed = (layer + 1) * 20;
        let offset = (menuTime * speed) % 200;
        
        for(let i=-1; i<6; i++) {
            let tx = i * 180 - offset + (layer*50);
            let ty = mc.height * 0.5 + layer * 30 + Math.sin(i*layer)*20;
            let th = 200 + layer*50; let tw = 40 + layer*10;
            
            mctx.fillRect(tx-tw/4, ty, tw/2, th); 
            mctx.beginPath(); mctx.moveTo(tx, ty-th*0.8); mctx.lineTo(tx-tw, ty+20); mctx.lineTo(tx+tw, ty+20); mctx.fill();
            mctx.beginPath(); mctx.moveTo(tx, ty-th*1.2); mctx.lineTo(tx-tw*0.8, ty-20); mctx.lineTo(tx+tw*0.8, ty-20); mctx.fill();
        }
    }
    requestAnimationFrame(drawMenuBackground);
}
drawMenuBackground();

const PERIODS = ['Morning', 'Afternoon', 'Evening', 'Night'];

function getSaveData(slot) {
    try { let data = localStorage.getItem('lumb_slow_life_' + slot); return data ? JSON.parse(data) : null; } 
    catch(e) { return null; }
}

function doSaveGame(slot) {
    playSound('menu');
    const saveData = {
        scene: GAME.scene, x: player.x, y: player.y, dir: player.dir,
        day: GAME.day, timeIdx: GAME.timeIdx, tired: GAME.tired, hasAxe: player.hasAxe, isRaining: GAME.isRaining,
        axeObj: { state: axe.state, x: axe.x, y: axe.y, z: axe.z },
        outdoorTrees: ENV.outdoor.trees.map(t => ({x: t.x, y: t.y, state: t.state, hits: t.hits, type: t.type, fallDir: t.fallDir})),
        flowerTrees: ENV.flower_field.trees.map(t => ({x: t.x, y: t.y, state: t.state, hits: t.hits, type: t.type, fallDir: t.fallDir})),
        timestamp: Date.now(), dateStr: new Date().toLocaleString()
    };
    try { 
        localStorage.setItem('lumb_slow_life_' + slot, JSON.stringify(saveData));
        showMsg("Game Saved in Slot " + slot);
        closeSlotMenu(); closeOptions(); checkAnySave();
    } catch(e) { console.error("Save failed", e); }
}

function doLoadGame(slot) {
    playSound('menu');
    const d = getSaveData(slot);
    if(d) {
        GAME.scene = d.scene || 'indoor';
        player.x = d.x || 200; player.y = d.y || 150; player.dir = d.dir || 'down';
        player.state = 'idle'; GAME.isNewGame = false;
        GAME.day = d.day; GAME.timeIdx = d.timeIdx; GAME.tired = d.tired; player.hasAxe = d.hasAxe;
        GAME.isRaining = d.isRaining || false;
        if(d.axeObj) {
            axe.state = d.axeObj.state; axe.x = d.axeObj.x; axe.y = d.axeObj.y; axe.z = d.axeObj.z || 0;
            player.hasAxe = (axe.state === 'player');
        } else {
            axe.state = player.hasAxe ? 'player' : 'stump'; axe.x = SCENES.outdoor.axeStump.x+12; axe.y = SCENES.outdoor.axeStump.y+12;
        }
        
        spawnOutdoorElements(); 
        if(d.outdoorTrees) { ENV.outdoor.trees = JSON.parse(JSON.stringify(d.outdoorTrees)); }
        if(d.flowerTrees) { ENV.flower_field.trees = JSON.parse(JSON.stringify(d.flowerTrees)); }
        
        if(GAME.scene === 'outdoor') {
            GAME.camX = Math.max(0, Math.min(player.x - 240, SCENES.outdoor.w - 480));
            GAME.camY = Math.max(0, Math.min(player.y - 135, SCENES.outdoor.h - 270));
        } else if (GAME.scene === 'flower_field') {
            GAME.camX = Math.max(0, Math.min(player.x - 240, SCENES.flower_field.w - 480));
            GAME.camY = Math.max(0, Math.min(player.y - 135, SCENES.flower_field.h - 270));
        } else { GAME.camX = 0; GAME.camY = 0; }
        
        closeSlotMenu(); startGame(true);
    }
}

function loadLatestGame() {
    playSound('menu');
    let latest = null, latestTime = 0, latestSlot = 1;
    for(let i=1; i<=3; i++) { let d = getSaveData(i); if(d && d.timestamp > latestTime) { latestTime = d.timestamp; latest = d; latestSlot = i; } }
    if(latest) doLoadGame(latestSlot);
}

window.deleteSave = function(e, slot) {
    e.stopPropagation(); playSound('menu');
    localStorage.removeItem('lumb_slow_life_' + slot);
    renderSlots('load'); checkAnySave();
}

function checkAnySave() {
    let hasSave = false;
    for(let i=1; i<=3; i++) if(getSaveData(i)) hasSave = true;
    const btn = document.getElementById('btn-continue');
    if(hasSave) { btn.classList.remove('disabled'); btn.style.background = '#4CAF50'; btn.style.borderColor = '#81C784'; }
    else { btn.classList.add('disabled'); btn.style.background = ''; btn.style.borderColor = ''; }
}
checkAnySave();

window.renderSlots = function(mode) {
    playSound('menu');
    const list = document.getElementById('slot-list'); list.innerHTML = '';
    document.getElementById('slot-title').innerText = mode === 'save' ? "Save Game" : "Load Game";
    
    const delSvg = `<svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`;

    for(let i=1; i<=3; i++) {
        const d = getSaveData(i);
        const div = document.createElement('div'); div.className = 'save-slot';
        
        let innerHTML = `<div style="flex-grow:1;">`;
        if(d) {
            innerHTML += `<div class="slot-title">Slot ${i} - Day ${d.day} (${PERIODS[d.timeIdx]})</div><div style="color:#aaa;">${d.dateStr}</div></div>`;
            if(mode === 'load') innerHTML += `<button class="delete-btn" title="Delete Save" onmouseenter="playSound('blip')" onclick="deleteSave(event, ${i})">${delSvg}</button>`;
            div.onmouseenter = () => playSound('blip');
            div.onclick = () => mode === 'save' ? doSaveGame(i) : doLoadGame(i);
        } else {
            innerHTML += `<div class="slot-title">Slot ${i}</div><div style="color:#666;">Empty Slot</div></div>`;
            if(mode === 'save') { div.onmouseenter = () => playSound('blip'); div.onclick = () => doSaveGame(i); }
            else div.style.opacity = '0.5';
        }
        div.innerHTML = innerHTML;
        list.appendChild(div);
    }
    
    if(mode === 'save') document.getElementById('options-menu').style.display = 'none';

function startAudio() {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    if(!isMusicPlaying) { 
        isMusicPlaying = true; 
        
        const bufferSize = audioCtx.sampleRate * 2;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for(let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        riverNoiseNode = audioCtx.createBufferSource(); riverNoiseNode.buffer = buffer; riverNoiseNode.loop = true;
        const rFilter = audioCtx.createBiquadFilter(); rFilter.type = 'lowpass'; rFilter.frequency.value = 500;
        riverGainNode = audioCtx.createGain(); riverGainNode.gain.value = 0;
        riverNoiseNode.connect(rFilter); rFilter.connect(riverGainNode); riverGainNode.connect(audioCtx.destination);
        riverNoiseNode.start(0);

        rainNoiseNode = audioCtx.createBufferSource(); rainNoiseNode.buffer = buffer; rainNoiseNode.loop = true;
        const wFilter = audioCtx.createBiquadFilter(); wFilter.type = 'bandpass'; wFilter.frequency.value = 1000; wFilter.Q.value = 0.5;
        rainGainNode = audioCtx.createGain(); rainGainNode.gain.value = 0;
        rainNoiseNode.connect(wFilter); wFilter.connect(rainGainNode); rainGainNode.connect(audioCtx.destination);
        rainNoiseNode.start(0);

        windNoiseNode = audioCtx.createBufferSource(); windNoiseNode.buffer = buffer; windNoiseNode.loop = true;
        windFilter = audioCtx.createBiquadFilter(); windFilter.type = 'bandpass'; windFilter.Q.value = 2.0;
        windGainNode = audioCtx.createGain(); windGainNode.gain.value = 0;
        windNoiseNode.connect(windFilter); windFilter.connect(windGainNode); windGainNode.connect(audioCtx.destination);
        windNoiseNode.start(0);

        playBGM(); 
    }
}

const menuMelody = [220.0, 329.63, 440.0, 523.25]; 
const gameMelody = [261.6, 329.6, 392.0, 261.6]; 
const flowerMelody1 = [329.6, 392.0, 440.0, 523.25]; 
const flowerMelody2 = [261.6, 329.6, 392.0, 440.0];
let noteIdx = 0, nextNoteTime = 0, cricketNextTime = 0, birdNextTime = 0, owlNextTime = 0;

function playBGM() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    
    if(!GAME.isSleeping) {
        while (nextNoteTime < now + 0.1) {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = isMainMenu ? 'triangle' : (GAME.scene === 'flower_field' ? 'square' : 'sine'); 
            
            if (GAME.scene === 'flower_field') {
                osc.frequency.value = (Math.random() > 0.5 ? flowerMelody1 : flowerMelody2)[noteIdx % 4];
            } else {
                osc.frequency.value = isMainMenu ? menuMelody[noteIdx % menuMelody.length] : gameMelody[noteIdx % gameMelody.length];
            }
            
            osc.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime((isMainMenu ? 0.08 : (GAME.scene === 'flower_field' ? 0.05 : 0.25)) * volMus, nextNoteTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 1.8);
            osc.start(nextNoteTime); osc.stop(nextNoteTime + 1.8);
            
            if(GAME.scene === 'flower_field') {
                const osc2 = audioCtx.createOscillator(); const gain2 = audioCtx.createGain();
                osc2.type = 'triangle'; osc2.frequency.value = flowerMelody1[(noteIdx+2) % 4] * 0.5;
                osc2.connect(gain2); gain2.connect(audioCtx.destination);
                gain2.gain.setValueAtTime(0.08 * volMus, nextNoteTime); gain2.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 2.0);
                osc2.start(nextNoteTime); osc2.stop(nextNoteTime + 2.0);
            }
            
            nextNoteTime += 1.8; noteIdx++;
        }

        if ((GAME.scene === 'outdoor' || GAME.scene === 'flower_field') && !isMainMenu && !GAME.isRaining) {
            if (GAME.timeIdx === 0 || GAME.timeIdx === 1) { 
                while (birdNextTime < now + 0.1) {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(3000 + Math.random()*1500, birdNextTime);
                    osc.frequency.exponentialRampToValueAtTime(2000 + Math.random()*1000, birdNextTime + 0.1);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    gain.gain.setValueAtTime(0, birdNextTime);
                    gain.gain.linearRampToValueAtTime(0.015 * volSfx, birdNextTime + 0.05);
                    gain.gain.linearRampToValueAtTime(0, birdNextTime + 0.1);
                    osc.start(birdNextTime); osc.stop(birdNextTime + 0.1);
                    birdNextTime += 1.5 + Math.random()*3.5; 
                }
            } else { birdNextTime = now + 1; }

            if (GAME.timeIdx === 2) { 
                while (owlNextTime < now + 0.1) {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.value = 350;
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    gain.gain.setValueAtTime(0, owlNextTime);
                    gain.gain.linearRampToValueAtTime(0.015 * volSfx, owlNextTime + 0.2);
                    gain.gain.linearRampToValueAtTime(0, owlNextTime + 0.5);
                    osc.start(owlNextTime); osc.stop(owlNextTime + 0.5);
                    owlNextTime += 4.0 + Math.random()*5.0;
                }
            } else { owlNextTime = now + 1; }

            if (GAME.timeIdx === 3) { 
                while (cricketNextTime < now + 0.1) {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.type = 'triangle'; osc.frequency.value = 4500 + Math.random()*200;
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    gain.gain.setValueAtTime(0, cricketNextTime);
                    gain.gain.linearRampToValueAtTime(0.015 * volSfx, cricketNextTime + 0.02);
                    gain.gain.linearRampToValueAtTime(0, cricketNextTime + 0.05);
                    gain.gain.setValueAtTime(0, cricketNextTime + 0.08);
                    gain.gain.linearRampToValueAtTime(0.015 * volSfx, cricketNextTime + 0.1);
                    gain.gain.linearRampToValueAtTime(0, cricketNextTime + 0.13);
                    osc.start(cricketNextTime); osc.stop(cricketNextTime + 0.15);
                    cricketNextTime += 0.8 + Math.random()*1.0;
                }
            } else { cricketNextTime = now + 1; }
        } else {
            birdNextTime = now + 1; owlNextTime = now + 1; cricketNextTime = now + 1;
        }
    } else {
        nextNoteTime = now + 0.1;
    }
    
    if(riverGainNode) {
        if((GAME.scene === 'outdoor' || GAME.scene === 'flower_field') && !GAME.paused && !isMainMenu) {
            const dist = Math.max(0, 640 - player.x);
            riverGainNode.gain.value = Math.max(0, (1 - dist / 400)) * 0.15 * volSfx;
            rainGainNode.gain.value = GAME.isRaining ? 0.25 * volSfx : 0;
            if(GAME.scene === 'flower_field') {
                windGainNode.gain.value = 0.3 * volSfx;
                if(windFilter) windFilter.frequency.value = 400 + Math.sin(now * 0.5) * 200;
            } else {
                windGainNode.gain.value = 0;
            }
        } else { 
            riverGainNode.gain.value = 0; rainGainNode.gain.value = 0; windGainNode.gain.value = 0;
        }
    }

    requestAnimationFrame(playBGM);
}

function playFootstep() {
    if(!audioCtx) return;
    const t = audioCtx.currentTime; const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    
    let vol = volSfx * 0.225; 
    
    let onPuddle = false;
    if ((GAME.scene === 'outdoor' || GAME.scene === 'flower_field') && GAME.isRaining) {
        for(let p of puddles) {
            if(Math.hypot(player.x - p.x, player.y - p.y) < p.w) { onPuddle = true; break; }
        }
    }

    if (onPuddle) {
        o.type = 'sine'; o.frequency.setValueAtTime(600, t); o.frequency.exponentialRampToValueAtTime(150, t + 0.1);
        g.gain.setValueAtTime(vol * 0.7, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
        
        const o2 = audioCtx.createOscillator(); const g2 = audioCtx.createGain();
        o2.type = 'triangle'; o2.frequency.setValueAtTime(1200, t); o2.frequency.exponentialRampToValueAtTime(300, t + 0.08);
        g2.gain.setValueAtTime(vol * 0.3, t); g2.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
        o2.connect(g2); g2.connect(audioCtx.destination);
        o2.start(t); o2.stop(t+0.1);
        o.start(t); o.stop(t+0.1);
        return;
    }

    if (GAME.scene === 'indoor') {
        if (player.x > 170 && player.x < 310 && player.y > 120 && player.y < 220) {
            o.type = 'sine'; o.frequency.setValueAtTime(80, t); o.frequency.exponentialRampToValueAtTime(30, t + 0.05);
            g.gain.setValueAtTime(vol * 0.6, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
            o.start(t); o.stop(t+0.05);
        } else {
            o.type = 'triangle'; o.frequency.setValueAtTime(100, t); o.frequency.exponentialRampToValueAtTime(30, t + 0.04);
            g.gain.setValueAtTime(vol * 0.7, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.04);
            o.start(t); o.stop(t+0.04);
        }
    } else if (GAME.scene === 'flower_field') {
        o.type = 'triangle'; o.frequency.setValueAtTime(350, t); o.frequency.exponentialRampToValueAtTime(150, t + 0.05);
        g.gain.setValueAtTime(vol * 0.6, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
        o.start(t); o.stop(t+0.05);
    } else {
        if (player.x > 560) { 
            o.type = 'sine'; o.frequency.setValueAtTime(250, t); o.frequency.exponentialRampToValueAtTime(80, t + 0.05);
            g.gain.setValueAtTime(vol * 0.7, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
            o.start(t); o.stop(t+0.05);
        } else if (player.x > 380 && player.x < 420) { 
            o.type = 'sine'; o.frequency.setValueAtTime(200, t); o.frequency.exponentialRampToValueAtTime(50, t + 0.05);
            g.gain.setValueAtTime(vol * 0.9, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
            o.start(t); o.stop(t+0.05);
        } else { 
            o.type = 'triangle'; o.frequency.setValueAtTime(300, t); o.frequency.exponentialRampToValueAtTime(100, t + 0.05);
            g.gain.setValueAtTime(vol * 0.6, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
            o.start(t); o.stop(t+0.05);
        }
    }
}

function playSound(type, dist = 0) {
    if(!audioCtx) return;
    let vol = volSfx;
    if(dist > 0) vol = Math.max(0.01, volSfx * (1 - Math.min(dist, 400)/400));
    
    const t = audioCtx.currentTime; const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    
    if(type === 'chop') { o.type='square'; o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(40,t+0.1); g.gain.setValueAtTime(0.3*vol,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.1); o.start(t); o.stop(t+0.1); }
    if(type === 'fall') { 
        o.type='sawtooth'; o.frequency.setValueAtTime(100,t); o.frequency.exponentialRampToValueAtTime(10,t+0.8); 
        g.gain.setValueAtTime(0.5*vol,t); g.gain.linearRampToValueAtTime(0.01,t+0.8); o.start(t); o.stop(t+0.8); 
        const o2 = audioCtx.createOscillator(); const g2 = audioCtx.createGain();
        o2.type='square'; o2.frequency.setValueAtTime(40, t+0.6); o2.frequency.exponentialRampToValueAtTime(1, t+0.8);
        g2.gain.setValueAtTime(0.8*vol, t+0.6); g2.gain.linearRampToValueAtTime(0.01, t+0.8);
        o2.connect(g2); g2.connect(audioCtx.destination); o2.start(t+0.6); o2.stop(t+0.8);
    }
    if(type === 'equip') { o.type='sine'; o.frequency.setValueAtTime(800,t); g.gain.setValueAtTime(0.1*vol,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.1); o.start(t); o.stop(t+0.1); }
    if(type === 'door') { o.type='square'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(80,t+0.2); g.gain.setValueAtTime(0.1*vol,t); g.gain.linearRampToValueAtTime(0.01,t+0.2); o.start(t); o.stop(t+0.2); }
    if(type === 'menu') { o.type='sine'; o.frequency.setValueAtTime(800,t); o.frequency.exponentialRampToValueAtTime(1200,t+0.1); g.gain.setValueAtTime(0.1*vol,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.1); o.start(t); o.stop(t+0.1); }
    if(type === 'blip') { o.type='square'; o.frequency.setValueAtTime(500,t); g.gain.setValueAtTime(0.05*vol,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.05); o.start(t); o.stop(t+0.05); }
    if(type === 'splash') { o.type='sine'; o.frequency.setValueAtTime(400,t); o.frequency.exponentialRampToValueAtTime(800,t+0.1); g.gain.setValueAtTime(0.1*vol,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.1); o.start(t); o.stop(t+0.1); }
    if(type === 'sleep') { 
        const bufferSize = audioCtx.sampleRate * 1.5; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0); for(let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 600;
        noise.connect(filter); filter.connect(g);
        g.gain.setValueAtTime(0.2*vol, t); g.gain.exponentialRampToValueAtTime(0.01, t+1.5); noise.start(t);
    }
    if(type === 'hop') { 
        o.type='triangle'; o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(20,t+0.1); 
        g.gain.setValueAtTime(0.2*vol,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.1); o.start(t); o.stop(t+0.1); 
    }
}

function generateMapData(mapName) {
    let m = ENV[mapName];
    m.trees.length = 0; m.animals.length = 0; m.rocks.length = 0; m.pathPoints.length = 0; m.coastPoints.length = 0; m.puddles.length = 0; m.bushes.length = 0; m.flowers = []; m.petals = [];
    
    for(let y = -20; y <= 620; y += 20) m.coastPoints.push({ y: y, x: Math.sin(y * 0.02) * 12 + Math.sin(y * 0.053) * 6 });
    
    let px = 400;
    let endY = mapName === 'outdoor' ? 620 : 150;
    let startY = mapName === 'outdoor' ? 140 : -20;
    
    for(let y = startY; y <= endY; y += 15) {
        let variance = mapName === 'outdoor' ? Math.max(0, (y - 140) / 480) : Math.max(0, (y + 20) / 170);
        px += (Math.random() - 0.5) * 12 * variance + Math.sin(y * 0.04) * 8 * Math.sqrt(variance);
        m.pathPoints.push({ x: px, y: y, w: 18 + Math.random()*6 });
    }
    
    for(let i=0; i<60; i++) {
        let rx = Math.random()*800; let ry = Math.random()*600;
        if(mapName === 'outdoor' && rx > 330 && rx < 470 && ry > 40 && ry < 160) continue; 
        if(rx > 570) continue; 
        m.rocks.push({x: rx, y: ry, s: 2+Math.random()*4, color: Math.random()>0.5?'#777':'#555'});
    }

    while(m.trees.length < (mapName === 'outdoor' ? 14 : 20)) {
        let side = Math.random() < 0.5 ? 1 : -1;
        let tx = side === 1 ? 40 + Math.random() * 250 : 490 + Math.random() * 30; 
        let ty = 40 + Math.random() * 450;
        if(mapName === 'outdoor' && tx > 300 && tx < 500 && ty < 170) continue; 
        if(tx > 520) continue; 
        let tType = mapName === 'flower_field' ? 'sakuraTree' : ('tree' + (Math.floor(Math.random() * 2) + 1));
        m.trees.push({ x: tx, y: ty, state: 'grown', fallT: 0, hits: 0, type: tType, fallDir: 1 });
    }
    
    for(let i=0; i<60; i++) {
        let bx, by;
        if(i<20) { bx = Math.random()*800; by = Math.random()*40; } 
        else if(i<40) { bx = Math.random()*800; by = 560 + Math.random()*40; } 
        else if(i<50) { bx = Math.random()*40; by = Math.random()*600; } 
        else { bx = 760 + Math.random()*40; by = Math.random()*600; } 
        if(bx > 380 && bx < 420 && by > 140) continue; 
        if(bx > 360 && bx < 440 && by < 100) continue; 
        if(bx > 550) continue; 
        m.bushes.push({x: bx, y: by});
    }

    if(GAME.isRaining) {
        for(let i=0; i<15; i++) {
            let px = 50 + Math.random() * 500; let py = 50 + Math.random() * 500;
            m.puddles.push({x: px, y: py, w: 10 + Math.random()*20, h: 5 + Math.random()*10});
        }
    } else {
        if(Math.random() < 0.4) {
            let count = 1 + Math.floor(Math.random()*3);
            for(let i=0; i<count; i++) m.animals.push({ type: 'frog', x: 575 + Math.random()*20, y: 100 + Math.random()*400, timer: 0, jx: 0, jy: 0 });
        }
        if(Math.random() < 0.4) {
            let count = 1 + Math.floor(Math.random()*3);
            for(let i=0; i<count; i++) {
                let isPink = Math.random() < 0.1;
                m.animals.push({ type: 'rabbit', c: isPink ? 'rabbitPink' : 'rabbitWhite', x: 50 + Math.random()*250, y: 100 + Math.random()*400, timer: 0, jx: 0, jy: 0 });
            }
        }
    }
    
    if(mapName === 'flower_field') {
        const fColors = ['#FF69B4', '#FFD700', '#FF4500', '#8A2BE2', '#FFFFFF', '#87CEFA'];
        
        let centers = [];
        for(let i=0; i<10; i++) centers.push({x: 50 + Math.random()*450, y: 50 + Math.random()*500});
        
        centers.forEach(c => {
            let count = 20 + Math.random()*20;
            for(let i=0; i<count; i++) {
                let r = Math.random() * 60; let ang = Math.random() * Math.PI * 2;
                let fx = c.x + Math.cos(ang)*r; let fy = c.y + Math.sin(ang)*r;
                if(fx > 380 && fx < 420 && fy < 160) continue; 
                if(fx > 570) continue;
                m.flowers.push({x: fx, y: fy, c: fColors[Math.floor(Math.random()*fColors.length)]});
            }
        });
        
        for(let i=0; i<60; i++) {
            m.petals.push({x: Math.random()*800, y: Math.random()*600, speed: 60+Math.random()*100, c: fColors[Math.floor(Math.random()*fColors.length)]});
        }
    }
}

function spawnOutdoorElements() {

        if(GAME.scene === 'flower_field') { flowers = m.flowers; petals = m.petals; }

}

        GAME.isNewGame = true; GAME.newGameTimer = 0;
        GAME.scene = 'indoor'; player.hasAxe = false; 
        GAME.day = 1; GAME.timeIdx = 0; GAME.tired = false; GAME.isRaining = false;
        
        player.state = 'sleeping_in_bed';

};

function showMsg(txt) { GAME.msg = txt; GAME.msgTimer = 2.5; playSound('blip'); }

function switchScene(target, tx, ty, tdir) {
    if(target === 'indoor' && player.hasAxe) { showMsg("Oh, I can't take the axe inside."); return; }
    GAME.fadeDir = 1; playSound('door');
    GAME.targetScene = target; GAME.tx = tx; GAME.ty = ty; GAME.tdir = tdir || 'down';
}

function interact() {
    if(GAME.fadeDir !== 0 || GAME.fadeHold > 0 || player.state === 'chopping') return;

    if(GAME.scene === 'indoor') {
        if(player.state === 'sleeping_in_bed') {
            player.state = 'idle'; player.x = 75; player.y = 110; player.dir = 'down'; GAME.isNewGame = false; playSound('hop'); return;
        }

        if(player.state === 'sitting') {
            player.state = 'idle'; player.y -= 20; player.dir = 'up'; return; 
        }

        if(player.x > 20 && player.x < 110 && player.y > 60 && player.y < 140) { 
            if(GAME.timeIdx < 3) {
                GAME.fadeDir = 1; GAME.targetTime = GAME.timeIdx + 1; GAME.isSleeping = true; playSound('sleep');
            } else {
                if(!GAME.tired) { showMsg("I haven't done any work today."); } 
                else { GAME.fadeDir = 1; GAME.targetTime = 'nextDay'; GAME.isSleeping = true; playSound('sleep'); }
            }
            return;
        }

        let closestFurn = null; let closestDist = Infinity;
        for(let f of SCENES.indoor.furn) {
            let dist = Math.hypot(player.x - (f.x+f.w/2), player.y - (f.y+f.h/2));
            if(dist < 35 && dist < closestDist) { closestFurn = f; closestDist = dist; }
        }
        
        if(closestFurn) {
            if(closestFurn.type === 'sofa') {
                if(player.y < closestFurn.y + 10 && player.dir === 'down') {
                    player.state = 'sitting'; player.x = closestFurn.x + 24; player.y = closestFurn.y + 12; player.dir = 'up'; 
                } else { showMsg("Oh, I should sit from the front."); }
            } else if(closestFurn.msg) { showMsg(closestFurn.msg); }
            return; 
        }
    } else if (GAME.scene === 'outdoor' || GAME.scene === 'flower_field') {
        if(player.x > 560 && player.dir === 'right') { 
            if (player.hasAxe) showMsg("Better keep the axe. The Lake Spirit isn't real.");
            else showMsg("Swimming... isn't really my strong suit."); 
            return; 
        }
        
        if(player.hasAxe) {
            if(GAME.scene === 'outdoor') {
                const ast = SCENES.outdoor.axeStump;
                if(Math.abs(player.x - (ast.x + 12)) < 30 && Math.abs(player.y - (ast.y + 12)) < 30) {
                    player.hasAxe = false; axe.state = 'stump'; axe.x = ast.x + 12; axe.y = ast.y + 12; axe.z = 0; playSound('equip'); return;
                }
            }

            let chopped = false;
            for(let t of trees) {
                let xDist = Math.abs(player.x - (t.x + 32)); let yDist = Math.abs(player.y - (t.y + 70));
                let toleranceX = Math.abs(player.dir === 'up' || player.dir === 'down') ? 15 : 45;
                let toleranceY = Math.abs(player.dir === 'left' || player.dir === 'right') ? 15 : 45;
                
                if(t.state === 'grown' && xDist < toleranceX && yDist < toleranceY) {
                    player.state = 'chopping'; player.dir = player.x < t.x + 32 ? 'right' : 'left'; player.chopTimer = 0.25;
                    t.hits = (t.hits || 0) + 1; playSound('chop');
                    if(t.hits >= 3) { 
                        t.state = 'falling_1'; t.fallT = 0; t.hits = 0; t.fallDir = Math.random() > 0.5 ? 1 : -1; GAME.tired = true; playSound('fall');
                        if (axe.state === 'stuck' && axe.treeObj === t) { axe.state = 'ground'; axe.treeObj = null; } 
                        if(typeof saveGame === 'function') saveGame(); 
                    }
                    chopped = true;
                    break;
                }
            }
            if (!chopped && axe.state === 'player') {
                player.hasAxe = false; axe.state = 'flying'; axe.x = player.x; axe.y = player.y; axe.z = 10;
                let spd = 250;
                axe.vx = (player.dir === 'left' ? -spd : (player.dir === 'right' ? spd : 0));
                axe.vy = (player.dir === 'up' ? -spd : (player.dir === 'down' ? spd : 0));
                axe.vz = 100; playSound('equip');
            }
        } else {
            if((axe.state === 'stump' || axe.state === 'ground' || axe.state === 'stuck') && Math.abs(player.x - axe.x) < 30 && Math.abs(player.y - axe.y) < 30) {
                player.hasAxe = true; axe.state = 'player'; axe.treeObj = null; playSound('equip'); return;
            }
            
            let msgSet = false;
            for(let t of trees) {
                if(t.state === 'grown' && Math.abs(player.x - (t.x+32)) < 45 && Math.abs(player.y - (t.y+70)) < 45) {
                    let r = Math.random();
                    if(r < 0.15) showMsg("My name is not Steve.");
                    else if (r < 0.3) showMsg("I can't punch down trees.");
                    else showMsg("Need an axe.");
                    msgSet = true; break;
                }
            }
            if(msgSet) return;
        }
    }
}

let lastSplashT = 0;

function update(dt) {
    if(GAME.paused && !isMainMenu) return;

    if(GAME.scene === 'indoor' && player.state === 'sleeping_in_bed' && GAME.isNewGame) {
        GAME.newGameTimer += dt;
    }

    if(GAME.fadeDir !== 0 || GAME.fadeHold > 0) {
        if(GAME.fadeHold > 0) {
            GAME.fadeHold -= dt;
            if(GAME.fadeHold <= 0) GAME.fadeDir = -1; 
            return;
        }
        
        GAME.fade += GAME.fadeDir * dt * 2;
        if(GAME.fade >= 1 && GAME.fadeDir === 1) { 
            GAME.fade = 1; 
            
            if(GAME.targetScene) {
                GAME.scene = GAME.targetScene; player.x = GAME.tx; player.y = GAME.ty; player.dir = GAME.tdir; GAME.targetScene = null;
                
                if(GAME.scene === 'outdoor' || GAME.scene === 'flower_field') {
                    bindMapData();
                }
                
                if(GAME.scene === 'outdoor') {
                    GAME.camX = Math.max(0, Math.min(player.x - 240, SCENES.outdoor.w - 480));
                    GAME.camY = Math.max(0, Math.min(player.y - 135, SCENES.outdoor.h - 270));
                } else if (GAME.scene === 'flower_field') {
                    GAME.camX = Math.max(0, Math.min(player.x - 240, SCENES.flower_field.w - 480));
                    GAME.camY = Math.max(0, Math.min(player.y - 135, SCENES.flower_field.h - 270));
                } else { GAME.camX = 0; GAME.camY = 0; }
                
                GAME.fadeDir = -1; 
            } else {
                GAME.fadeDir = 0; GAME.fadeHold = 2.0; 
            }

            if(GAME.targetTime === 'nextDay' || GAME.targetTime !== null) { 
                if(GAME.targetTime === 'nextDay') {
                    GAME.day++; GAME.timeIdx = 0; GAME.tired = false; GAME.targetTime = null; 
                    GAME.isRaining = (Math.random() < 0.28); 
                    spawnOutdoorElements(); 
                } else {
                    GAME.timeIdx = GAME.targetTime; 
                }
                
                GAME.scene = 'indoor';
                player.state = 'sleeping_in_bed'; player.x = 44; player.y = 100; player.dir = 'down';
                GAME.camX = 0; GAME.camY = 0;
                
                GAME.targetTime = null; 
                if(typeof saveGame === 'function') saveGame(); 
            }
        }
        if(GAME.fade <= 0) { GAME.fade = 0; GAME.fadeDir = 0; GAME.isSleeping = false; }
        return;
    }
    
    if(GAME.msgTimer > 0) GAME.msgTimer -= dt;

    if(GAME.scene === 'flower_field') {
        petals.forEach(p => {
            p.x += p.speed * dt;
            p.y += Math.sin(p.x * 0.05) * 20 * dt;
            if(p.x > 820) { p.x = -20; p.y = Math.random() * 600; }
        });
    }

    if(GAME.scene === 'outdoor' || GAME.scene === 'flower_field') {
        trees.forEach(t => {
            if(t.state.startsWith('falling')) {
                t.fallT += dt;
                if(t.fallT > 0.15 && t.state === 'falling_1') t.state = 'falling_2';
                if(t.fallT > 0.3 && t.state === 'falling_2') t.state = 'falling_3';
                if(t.fallT > 0.45) t.state = 'fallen';
            }
        });
        
        if(axe.state === 'flying') {
            axe.x += axe.vx * dt; axe.y += axe.vy * dt; axe.z += axe.vz * dt;
            axe.vz -= 400 * dt; 
            
            let hitTree = false;
            if (GAME.scene === 'outdoor' && axe.x > 330 && axe.x < 470 && axe.y > 60 && axe.y < 160 && axe.z < 40) {
                if (axe.x > 380 && axe.x < 420 && axe.y > 110) showMsg("No. This can't get inside.");
                axe.state = 'ground'; axe.z = 0;
                playSound('hop', Math.hypot(player.x - axe.x, player.y - axe.y));
                hitTree = true; 
            }
            
            if (!hitTree) {
                for (let t of trees) {
                    let xDist = Math.abs(axe.x - (t.x + 32));
                    let yDist = Math.abs(axe.y - (t.y + 70));
                    let toleranceX = Math.abs(axe.vy) > 0 ? 12 : 25; 
                    let toleranceY = Math.abs(axe.vx) > 0 ? 12 : 30;
                    
                    if (t.state === 'grown' && xDist < toleranceX && yDist < toleranceY && axe.z < 40) {
                        axe.state = 'stuck'; axe.treeObj = t; 
                        
                        let hitLeft = axe.x <= t.x + 32;
                        axe.x = t.x + (hitLeft ? 26 : 38); 
                        axe.y = t.y + 78; 
                        axe.z = 5; 
                        
                        t.hits = (t.hits || 0) + 1; playSound('chop');
                        if (t.hits >= 3) {
                            t.state = 'falling_1'; t.fallT = 0; t.hits = 0; t.fallDir = Math.random() > 0.5 ? 1 : -1; GAME.tired = true; playSound('fall');
                            axe.state = 'ground'; axe.treeObj = null; axe.z = 0;
                        }
                        hitTree = true; break;
                    }
                }
            }
            if(!hitTree && axe.z <= 0) { axe.z = 0; axe.state = 'ground'; playSound('hop', Math.hypot(player.x - axe.x, player.y - axe.y)); } 
            if(axe.x > 560) { axe.x = 560; axe.state = 'ground'; axe.z = 0; } 
            if(axe.x < 20 || axe.x > 780 || axe.y < 20 || axe.y > 580) { axe.state = 'ground'; axe.z = 0; } 
        }

        birds.forEach(b => {
            if(b.state === 'idle') {
                if(!isMainMenu && Math.hypot(player.x - b.x, player.y - b.y) < 60) { 
                    b.state = 'flying'; 
                    b.vx = (Math.random() > 0.5 ? 1 : -1) * (80 + Math.random()*80); 
                    b.vy = -40 - Math.random()*40; 
                }
            } else { 
                b.x += b.vx*dt; b.y += b.vy*dt; b.flapT += dt * 15; 
            }
        });
        animals.forEach(a => {
            a.timer -= dt;
            let pDist = Math.hypot(player.x - a.x, player.y - a.y);
            if(a.timer <= 0) {
                if(pDist < 80) { 
                    let ang = Math.atan2(a.y - player.y, a.x - player.x);
                    a.jx = Math.cos(ang)*80; a.jy = Math.sin(ang)*80; a.timer = 0.3; 
                    if(a.type !== 'frog') playSound('hop', pDist);
                } else if(Math.random() < 0.05) {
                    a.jx = (Math.random()-0.5)*40; a.jy = (Math.random()-0.5)*40; a.timer = 0.6;
                    if(a.type !== 'frog') playSound('hop', pDist);
                }
            } else if (a.timer > 0) {
                a.x += a.jx * dt; a.y += a.jy * dt;
                if(a.type === 'frog') { 
                    if(a.x < 560) a.x = 560; 
                    if(a.x > 585) a.x = 585; 
                }
                if(a.type === 'rabbit') { 
                    if(a.x > 500) a.x = 500; 
                    if(a.x < 20) a.x = 20; 
                }
                if(a.y < 20) a.y = 20; if(a.y > 580) a.y = 580;
            }
        });
        
        if(Math.random() < 0.01) {
            let colors = ['fishRed', 'fishBlue', 'fishGold'];
            fishes.push({x: 640 + Math.random()*120, y: Math.random()*600, z: 0, vz: 100 + Math.random()*80, life: 1, c: colors[Math.floor(Math.random()*colors.length)]});
        }
        fishes.forEach((f, i) => {
            f.z += f.vz * dt; f.vz -= 300 * dt; 
            if(f.z < 0) { f.z = 0; f.life -= dt * 2; }
            if(f.life < 0) fishes.splice(i, 1);
        });
    }

    if(player.chopTimer > 0) {
        player.chopTimer -= dt;
        if(player.chopTimer <= 0) { player.state = 'idle'; player.chopTimer = 0; }
        return;
    }

    if(isMainMenu) return;

    let dx = 0, dy = 0;
    if(keys.w) dy = -1; if(keys.s) dy = 1; if(keys.a) dx = -1; if(keys.d) dx = 1;
    player.moving = (dx !== 0 || dy !== 0) && player.state !== 'sitting' && player.state !== 'sleeping_in_bed';

    if(player.moving) {
        if(dx !== 0 && dy !== 0) { const l = Math.sqrt(dx*dx + dy*dy); dx /= l; dy /= l; }
        const speed = keys.shift ? player.speedRun : player.speedWalk;
        const nx = player.x + dx * speed * dt; const ny = player.y + dy * speed * dt;
        
        player.dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up');
        
        let prevFrame = player.frame;
        player.animTimer += dt * (keys.shift ? 2 : 1);
        if(player.animTimer > 0.15) { player.frame = (player.frame + 1) % 4; player.animTimer = 0; }

        if((player.frame === 1 && prevFrame !== 1) || (player.frame === 3 && prevFrame !== 3)) {
            playFootstep();
        }

        if((GAME.scene === 'outdoor' || GAME.scene === 'flower_field') && GAME.isRaining) {
            if(performance.now() - lastSplashT > 300) {
                for(let p of puddles) {
                    if(Math.hypot(player.x - p.x, player.y - p.y) < p.w) { playSound('splash'); lastSplashT = performance.now(); break; }
                }
            }
        }

        let mx = true, my = true; const sc = SCENES[GAME.scene];
        
        const hb = (x,y) => ({ l: x-4, r: x+4, t: y+2, b: y+6 }); 
        
        const collides = (b) => {
            if(b.l < sc.bounds.l || b.r > sc.bounds.r || b.t < sc.bounds.t || b.b > sc.bounds.b) {
                if(GAME.scene === 'outdoor' && b.b >= sc.bounds.b && b.l > 350 && b.r < 450) { switchScene('flower_field', player.x, 30, 'down'); return true; }
                if(GAME.scene === 'flower_field' && b.t <= sc.bounds.t && b.l > 350 && b.r < 450) { switchScene('outdoor', player.x, 570, 'up'); return true; }
                if(GAME.scene === 'indoor') {
                    if(b.t <= sc.bounds.t) { if(b.l > 210 && b.r < 270) { switchScene('outdoor', 400, 105, 'up'); return true; } }
                    if(b.b >= sc.bounds.b) { if(b.l > 210 && b.r < 270 && player.dir === 'down') { switchScene('outdoor', 400, 165, 'down'); return true; } }
                }
                return true;
            }
            if(GAME.scene === 'indoor') {
                if(b.r > 20 && b.l < 68 && b.b > 75 && b.t < 139) return true; 
                if(b.t < 110 && b.r > 380 && b.l < 404) return true; 
                for(let f of sc.furn) {
                    if(b.r > f.x && b.l < f.x+f.w && b.b > f.y && b.t < f.y+f.h) return true; 
                }
            } else if(GAME.scene === 'outdoor' || GAME.scene === 'flower_field') {
                if(b.r > 600) return true; 
                if(GAME.scene === 'outdoor' && b.r > 335 && b.l < 465 && b.b > 110 && b.t < 150) { 
                    if(b.l > 385 && b.r < 415 && b.t < 165 && b.b > 150 && player.dir === 'up') { switchScene('indoor', 240, 255, 'up'); return true; }
                    if(b.l > 385 && b.r < 415 && b.t < 120 && b.b > 105 && player.dir === 'down') { switchScene('indoor', 240, 90, 'down'); return true; }
                    return true;
                }
                if(GAME.scene === 'outdoor') {
                    const ast = sc.axeStump; if(b.r > ast.x && b.l < ast.x+ast.w && b.b > ast.y && b.t < ast.y+ast.h) return true;
                }
                for(let t of trees) if((t.state === 'grown' || t.state === 'stump' || t.state === 'fallen') && b.r > t.x+24 && b.l < t.x+40 && b.b > t.y+65 && b.t < t.y+85) return true;
            }
            return false;
        };

        if(collides(hb(nx, player.y))) mx = false; if(collides(hb(player.x, ny))) my = false;
        if(mx) player.x = nx; if(my) player.y = ny;
    } else { player.frame = 0; }

    if(GAME.scene !== 'indoor') {
        GAME.camX = Math.max(0, Math.min(player.x - 240, SCENES[GAME.scene].w - 480));
        GAME.camY = Math.max(0, Math.min(player.y - 135, SCENES[GAME.scene].h - 270));
    } else { GAME.camX = 0; GAME.camY = 0; }
}

function drawPlayer(x, y) {
    if(isMainMenu) return; 
    ctx.save(); ctx.translate(x, y);
    if(player.dir === 'left') ctx.scale(-1, 1);
    
    let isSit = player.state === 'sitting';
    let isSleep = player.state === 'sleeping_in_bed';
    const bob = (isSit || isSleep) ? 0 : (player.moving && (player.frame===1 || player.frame===3)) ? -1 : 0;
    if(isSit) ctx.translate(0, 4); 
    
    if(!isSleep) {
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0, 10, 8, 4, 0, 0, Math.PI*2); ctx.fill();
    }

    if(!isSit) { 
        ctx.fillStyle = isSleep ? '#D8D8D8' : '#F8F8F8'; 
        let ly1 = 4+bob, ly2 = 4+bob;
        if(player.moving) { if(player.frame===1) { ly1-=2; ly2+=1; } if(player.frame===3) { ly1+=1; ly2-=2; } }
        
        if(player.dir === 'up' || player.dir === 'down') { 
            ctx.fillRect(-5, ly1, 4, 6); ctx.fillRect(1, ly2, 4, 6); 
        } else { 
            ctx.fillRect(-3, ly2, 4, 6); ctx.fillRect(1, ly1, 4, 6); 
        }
    }

    ctx.fillStyle = '#D84038'; ctx.fillRect(-6, -4+bob, 12, 10); 
    if(player.dir === 'down') { ctx.fillStyle = '#F8D088'; ctx.fillRect(-2, -4+bob, 4, 4); } 
    
    ctx.fillStyle = '#F8D088'; ctx.fillRect(-5, -12+bob, 10, 8); 
    ctx.fillStyle = '#D84038'; ctx.fillRect(-6, -14+bob, 12, 4); 
    
    if(isSleep) { 
        ctx.fillStyle = '#000'; ctx.fillRect(-4, -9+bob, 3, 1); ctx.fillRect(1, -9+bob, 3, 1);
    } else {
        if(player.dir === 'right' || player.dir === 'left') { ctx.fillRect(4, -14+bob, 4, 2); ctx.fillStyle = '#000'; ctx.fillRect(2, -10+bob, 2, 2); }
        if(player.dir === 'down') { ctx.fillRect(-6, -14+bob, 12, 2); ctx.fillStyle = '#000'; ctx.fillRect(-3, -9+bob, 2, 2); ctx.fillRect(1, -9+bob, 2, 2); }
        if(player.dir === 'up') { ctx.fillStyle = '#D84038'; ctx.fillRect(-5, -12+bob, 10, 8); }
    }

    if(player.state === 'chopping') {
        ctx.fillStyle = '#D84038';
        ctx.fillRect(2, 0, 8, 4); ctx.fillStyle = '#F8D088'; ctx.fillRect(8, 0, 3, 4); 
        ctx.save(); ctx.translate(10, 2); ctx.rotate(Math.PI/3); ctx.drawImage(SPRITES.axe, -8, -14); ctx.restore(); 
    } else if(!isSit && !isSleep) {
        if(player.dir === 'down' || player.dir === 'up') {
            ctx.fillStyle = '#D84038'; ctx.fillRect(-8, -4+bob, 3, 6); ctx.fillRect(5, -4+bob, 3, 6);
            if(player.hasAxe && player.dir === 'down') {
                ctx.save(); ctx.translate(6, 4+bob); ctx.rotate(Math.PI/8); ctx.drawImage(SPRITES.axe, -6, -16); ctx.restore();
                ctx.fillStyle = '#F8D088'; ctx.fillRect(5, 2+bob, 3, 3); ctx.fillRect(-8, 2+bob, 3, 3); 
            } else {
                ctx.fillStyle = '#F8D088'; ctx.fillRect(5, 2+bob, 3, 3); ctx.fillRect(-8, 2+bob, 3, 3);
            }
        } else {
            ctx.fillStyle = '#D84038'; ctx.fillRect(-1, -4+bob, 4, 6);
            if(player.hasAxe) {
                ctx.save(); ctx.translate(2, 4+bob); ctx.rotate(Math.PI/6); ctx.drawImage(SPRITES.axe, -6, -16); ctx.restore();
                ctx.fillStyle = '#F8D088'; ctx.fillRect(-1, 2+bob, 4, 3);
            } else {
                ctx.fillStyle = '#F8D088'; ctx.fillRect(-1, 2+bob, 4, 3); 
            }
        }
    } else if(isSleep) {
        ctx.fillStyle = '#D84038'; ctx.fillRect(-8, -4+bob, 3, 6); ctx.fillRect(5, -4+bob, 3, 6);
        ctx.fillStyle = '#F8D088'; ctx.fillRect(5, 2+bob, 3, 3); ctx.fillRect(-8, 2+bob, 3, 3);
    }
    ctx.restore();
}

function drawCoastLayer(offsetX, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(800, -20);
    ctx.lineTo(offsetX + coastPoints[0].x, -20);
    for(let i=0; i<coastPoints.length; i++) ctx.lineTo(offsetX + coastPoints[i].x, coastPoints[i].y);
    ctx.lineTo(800, 620);
    ctx.fill();
}

function draw() {
    if(isMainMenu) return; 
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 480, 270);
    ctx.save(); ctx.translate(-GAME.camX, -GAME.camY);

    if(GAME.scene === 'indoor') {
        ctx.fillStyle = PAL.wallIndoor; ctx.fillRect(0, 0, 480, 85);
        ctx.fillStyle = PAL.floor; ctx.fillRect(0, 85, 480, 185);
        ctx.fillStyle = PAL.rug; ctx.fillRect(170, 120, 140, 100); ctx.fillStyle = '#C83028'; ctx.fillRect(175, 125, 130, 90); 
        ctx.fillStyle = PAL.blueRug; ctx.fillRect(210, 45, 60, 40); 
        ctx.fillStyle = '#383838'; ctx.fillRect(215, 45, 50, 40); ctx.fillStyle = '#6890F0'; ctx.fillRect(220, 50, 40, 35); 
        ctx.fillStyle = '#D8A058'; ctx.fillRect(210, 250, 60, 20); 

        ctx.shadowColor = 'rgba(0,0,0,0.4)';
        ctx.shadowBlur = 8;
        ctx.fillStyle = 'rgba(0,0,0,0.2)'; 
        ctx.fillRect(24, 135, 40, 6); 
        SCENES.indoor.furn.forEach(f => { 
            if(f.type === 'dustbin' || f.type === 'plant') {
                ctx.beginPath(); ctx.ellipse(f.x + f.w/2, f.y + f.h, f.w/2, 4, 0, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.fillRect(f.x+4, f.y+f.h-4, f.w-8, 6); 
            }
        });
        ctx.shadowBlur = 0;

        ctx.drawImage(SPRITES.bed, 20, 75);
        SCENES.indoor.furn.forEach(f => { if(f.type === 'sofa') ctx.drawImage(SPRITES.sofa, f.x, f.y); });
        
        let indoorRenders = [];
        indoorRenders.push({ type: 'player', y: player.y });
        SCENES.indoor.furn.forEach(f => {
            if(f.type !== 'sofa') indoorRenders.push({ type: 'furn', obj: f, y: f.y + f.h - 5 });
        });
        indoorRenders.sort((a,b) => a.y - b.y);

        indoorRenders.forEach(r => {
            if (r.type === 'player' && (player.state === 'sitting' || player.state === 'sleeping_in_bed' || player.state === 'idle' || player.state === 'moving')) {
                drawPlayer(player.x, player.y);
            } else if (r.type === 'furn') {
                ctx.drawImage(SPRITES[r.obj.type], r.obj.x, r.obj.y);
            }
        });
        
        if (player.state === 'sleeping_in_bed' && GAME.isNewGame && GAME.newGameTimer > 5) {
            ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = '12px Courier New'; ctx.textAlign = 'left';
            ctx.fillText("Press [E] to wake up", player.x + 15, player.y + 10);
        }

    } 
    else if(GAME.scene === 'flower_field') {
        ctx.fillStyle = '#5CA838'; ctx.fillRect(0, 0, SCENES.flower_field.w, SCENES.flower_field.h);
        
        ctx.fillStyle = '#489028'; 
        for(let i=10; i<SCENES.flower_field.w; i+=30) for(let j=10; j<SCENES.flower_field.h; j+=30) { 
            ctx.fillRect(i,j,4,4); ctx.fillRect(i+4,j-4,4,4); 
        }

        // Render Ground Rocks FIRST
        rocks.forEach(r => {
            let rx = r.x; let ry = r.y; let rs = r.s;
            ctx.fillStyle = r.color;
            ctx.beginPath(); ctx.ellipse(rx, ry, rs, rs*0.6, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.2)';

            if(r.type === 'player' && player.state !== 'sitting' && player.state !== 'sleeping_in_bed') drawPlayer(player.x, player.y);
        });

        if(GAME.isRaining) {
            ctx.strokeStyle = 'rgba(200, 220, 255, 0.4)'; ctx.lineWidth = 1;
            let fallOffset = (performance.now() * 0.8) % 300;
            ctx.beginPath();
            for(let i=0; i<150; i++) {
                let rx = ((i * 37) % 800); let ry = (((i * 53) + fallOffset) % 600);
                ctx.moveTo(rx, ry); ctx.lineTo(rx - 4, ry + 12);
            }
            ctx.stroke();
            
            ctx.fillStyle = 'rgba(200, 220, 255, 0.6)';
            for(let i=0; i<10; i++) {
                let dx = Math.random()*800; let dy = Math.random()*600;
                ctx.beginPath(); ctx.ellipse(dx, dy, 2, 1, 0, 0, Math.PI*2); ctx.fill();
            }
            ctx.fillStyle = 'rgba(30, 40, 60, 0.2)'; ctx.fillRect(0,0,SCENES.outdoor.w,SCENES.outdoor.h); 
        } else {
            if(GAME.timeIdx === 1) { ctx.fillStyle = 'rgba(255, 200, 100, 0.15)'; ctx.fillRect(0,0,SCENES.outdoor.w,SCENES.outdoor.h); }
            else if(GAME.timeIdx === 2) { ctx.fillStyle = 'rgba(200, 80, 0, 0.35)'; ctx.fillRect(0,0,SCENES.outdoor.w,SCENES.outdoor.h); }
            else if(GAME.timeIdx === 3) { 
                ctx.fillStyle = 'rgba(0, 10, 60, 0.65)'; ctx.fillRect(0,0,SCENES.outdoor.w,SCENES.outdoor.h); 
                ctx.fillStyle = 'rgba(255,255,100,0.5)'; ctx.fillRect(350, 105, 20, 25); ctx.fillRect(430, 105, 20, 25); 
            }
        }
        
        // Render Sun Rays for the outdoor map
        if (GAME.timeIdx !== 3 && !GAME.isRaining) {
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            const rayTime = performance.now() / 3000;
            let grad = ctx.createLinearGradient(0, 0, 800, 600);
            if(GAME.timeIdx === 2) {
                grad.addColorStop(0, 'rgba(255, 120, 50, 0.12)');
                grad.addColorStop(1, 'rgba(255, 120, 50, 0)');
            } else {
                grad.addColorStop(0, 'rgba(255, 240, 180, 0.12)');
                grad.addColorStop(1, 'rgba(255, 240, 180, 0)');
            }
            ctx.fillStyle = grad;
            for(let i=0; i<5; i++) {
                ctx.beginPath();
                let sway = Math.sin(rayTime + i) * 50;
                if(GAME.timeIdx === 0) { 
                    let startX = i * 200 - 100 + sway;
                    ctx.moveTo(startX, -50); ctx.lineTo(startX + 150, -50);
                    ctx.lineTo(startX + 600, 650); ctx.lineTo(startX + 450, 650);
                } else if (GAME.timeIdx === 2) { 
                    let startX = 800 - (i * 200 - 100) + sway;
                    ctx.moveTo(startX, -50); ctx.lineTo(startX - 150, -50);
                    ctx.lineTo(startX - 600, 650); ctx.lineTo(startX - 450, 650);
                } else { 
                    let startX = i * 200 - 100 + sway;
                    ctx.moveTo(startX, -50); ctx.lineTo(startX + 150, -50);
                    ctx.lineTo(startX + 100, 650); ctx.lineTo(startX - 50, 650);
                }
                ctx.fill();
            }
            ctx.restore();
        }
    }

    if(GAME.scene === 'indoor' && player.state !== 'sitting' && player.state !== 'sleeping_in_bed') drawPlayer(player.x, player.y);
    ctx.restore();

    if(GAME.scene && !isMainMenu) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.roundRect(10, 10, 120, 24, 12); ctx.fill();
        let slideX = 14 + GAME.timeIdx * 30; 
        ctx.fillStyle = (GAME.timeIdx === 3 || GAME.isRaining) ? '#A0C0FF' : '#FFD700'; 
        ctx.beginPath(); ctx.arc(slideX + 8, 22, 6, 0, Math.PI*2); ctx.fill();
        if(GAME.timeIdx === 3 || GAME.isRaining) { ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.arc(slideX + 11, 20, 5, 0, Math.PI*2); ctx.fill(); }
        
        ctx.fillStyle = '#FFF'; ctx.font = 'bold 12px Courier New'; ctx.textAlign = 'left'; 
        ctx.fillText(`Day ${GAME.day}`, 12, 48);
    }

    if(GAME.msgTimer > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 230, 480, 40);
        ctx.fillStyle = '#FFF'; ctx.font = '14px Courier New'; ctx.textAlign = 'center'; ctx.fillText(GAME.msg, 240, 255);
    }
    
    if(GAME.fade > 0) {
        ctx.fillStyle = `rgba(0,0,0,${GAME.fade})`; ctx.fillRect(0,0,480,270);
        if(GAME.isSleeping && GAME.fadeHold > 0 && GAME.scene === 'indoor') {
            ctx.fillStyle = '#FFF'; ctx.font = 'bold 20px Courier New'; ctx.textAlign = 'center'; 
            ctx.fillText(`Day ${GAME.day}`, 240, 120);
            ctx.font = '14px Courier New'; ctx.fillText(PERIODS[GAME.timeIdx], 240, 140);
        }
    }
}

let lastTime = performance.now();
function loop(time) { const dt = Math.min((time - lastTime) / 1000, 0.1); lastTime = time; update(dt); draw(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
</script>
</body>
